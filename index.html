<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="img/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,50..150,100..900;1,50..150,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.4.1.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <title></title>
</head>

<body class="anybody-moomin">
  <header id="siteHeader">
      <div class="menu-icon" id="menuIcon" role="button" tabindex="0" aria-label="Menu" aria-expanded="false"
        aria-controls="navbar">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <img src="img/logo.svg" alt="Hostand logo" class="nav-logo">
      <div class="language-switcher">
        <select id="languageSelectTop" aria-label="Language"></select>
      </div>
      <nav id="navbar" aria-label="Main navigation"></nav> 
  </header>

  <main>
    <div class="hero" id="hero" > 
    <div class="hero-content"> 
      <p data-i18n="hero-title" class="hero-title"></p>
      <p data-i18n="hero-subtitle" class="hero-subtitle"></p>
      </div>
    </div>
    <section id="about"></section>
    <section id="travel"></section>
    <section id="business"></section>
    <section id="students"></section>
    <section id="contact"></section>
  </main>
  <footer id="siteFooter"></footer>
  <!-- External libs (no inline JS) -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js" defer></script>
  <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.4.1.min.js"></script>
  <script src="script.js?v=1.0.1" defer></script>
</body>

</html>
